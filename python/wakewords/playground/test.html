<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wakewords playground</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/">wakewords</a>
        <nav class="nav" aria-label="playground">
          <a href="/" aria-current="page">playground</a>
          <a href="/record">record</a>
          <a href="/test-report">test report</a>
        </nav>
      </header>

      <section class="controls">
        <button id="enableMic" type="button">Enable mic</button>
        <form id="windowConfig" class="window-config">
          <label>
            Window seconds
            <input id="windowSeconds" type="number" min="0.1" step="0.1" value="1" />
          </label>
          <label>
            Step ms
            <input id="stepMs" type="number" min="1" step="1" value="100" />
          </label>
          <button type="submit">Update</button>
        </form>
        <label class="threshold-control">
          Threshold
          <input id="threshold" type="range" min="0" max="100" value="90" />
          <span id="thresholdValue">90%</span>
        </label>
        <div id="status" class="status">idle</div>
      </section>

      <section id="labelGrid" class="grid" aria-live="polite"></section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script type="module" src="/static/test.js"></script>
  </body>
</html>
